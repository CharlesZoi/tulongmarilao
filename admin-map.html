<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Mapview</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="icons/windows11/Square44x44Logo.targetsize-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/windows11/Square44x44Logo.targetsize-16.png">
    <link rel="shortcut icon" href="icons/android/android-launchericon-48-48.png">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Admin map uses base styles only */
        .admin-map-toolbar {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .admin-map-dashboard {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.55rem 0.95rem;
            border-radius: 999px;
            background: #0f172a;
            color: #f8fafc;
            border: 1px solid rgba(148, 163, 184, 0.25);
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: none;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.2);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .admin-map-dashboard:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 22px rgba(15, 23, 42, 0.25);
        }
    </style>
</head>

<body>
    <main>
        <div class="map-container">
            <div id="map"></div>
            <div class="admin-map-toolbar">
                <a class="admin-map-dashboard" href="master-admin.html">
                    <i class="fas fa-th-large"></i>
                    Go to Dashboard
                </a>
                <button type="button" id="resetMapView" class="map-reset-btn" aria-label="Reset map view">
                    <i class="fas fa-arrows-rotate"></i>
                    <span class="map-reset-label">Reset View</span>
                </button>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Environment Variables -->

  "FIREBASE_PROJECT_ID": "tulong-marilao",

  "USE_GOOGLE_MAPS": "false"

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
        import { getFirestore } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';
        import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
        import { firebaseConfig } from './firebase-config.js';
        import { firebaseChatConfig } from './firebase-chat-config.js';

        // Initialize Firebase
        try {
            const app = initializeApp(firebaseConfig, 'master-admin');
            const db = getFirestore(app);
            const auth = getAuth(app);

            // Make Firebase available globally
            window.firebaseApp = app;
            window.firestoreDb = db;
            window.firebaseAuth = auth;

            // Initialize Chat Firebase (for chat messages only)
            try {
                const chatApp = initializeApp(firebaseChatConfig, 'chat');
                const chatDb = getFirestore(chatApp);
                const chatAuth = getAuth(chatApp);

                // Make Chat Firebase available globally
                window.firebaseChatApp = chatApp;
                window.firestoreChatDb = chatDb;
                window.firebaseChatAuth = chatAuth;

                console.log('Chat Firebase SDK loaded successfully');
            } catch (error) {
                console.warn('Chat Firebase initialization failed:', error);
                console.warn('Chat functionality will be disabled');
            }

            // Mark this as admin map
            window.isAdminMap = true;
            window.isAdminAuthenticated = false;

            console.log('Firebase SDK loaded successfully - Admin Map Mode');

            // Check authentication
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    // Check if user is MASTER ADMIN
                    if (user.email === 'louisejane1007@gmail.com') {

                        // Master admin - allow access
                        window.isAdminAuthenticated = true;
                        window.adminUser = user;
                        const adminEmail = document.getElementById('adminEmail');
                        if (adminEmail) {
                            adminEmail.textContent = `Admin: ${user.email}`;
                        }

                        const logoutBtn = document.getElementById('logoutBtn');
                        if (logoutBtn) {
                            logoutBtn.style.display = 'inline-block';
                        }
                        console.log(' Master Admin authenticated:', user.email);

                    } else {
                        // Regular user - redirect to public map
                        console.log('⚠️ Regular user detected - redirecting to public map');
                        alert('This is the master admin map. Regular users should use the public map.');
                        window.location.href = 'index.html';
                    }
                } else {
                    // Not logged in - redirect to admin panel
                    console.log('❌ No admin session - redirecting to login');
                    alert('Please login to access the admin map');
                    window.location.href = 'admin.html';
                }
            });

            // Logout button
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', async () => {
                    try {
                        await signOut(auth);
                        window.location.href = 'admin.html';
                    } catch (error) {
                        console.error('Logout error:', error);
                    }
                });
            }

        } catch (error) {
            console.error('Firebase initialization failed:', error);
            alert('Failed to connect to database. Please try again.');
            window.location.href = 'admin.html';
        }
    </script>

    <script src="script_clean.js"></script>

</body>

</html>
